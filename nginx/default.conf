server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests; media-src 'self' https://influweb.org/ https://*.influweb.org/; img-src 'self' https://www.facebook.com data: https://influweb.org/ https://*.influweb.org/; style-src 'unsafe-inline' 'self' https://www.gstatic.com/recaptcha/ https://www.google.com/recaptcha/; script-src 'unsafe-inline' 'self' 'unsafe-eval' https://cdn.jsdelivr.net https://connect.facebook.net http://*.iubenda.com/ https://www.gstatic.com/recaptcha/ https://www.google.com/recaptcha/; frame-src 'self' https://www.google.com/recaptcha/ https://recaptcha.google.com/recaptcha; child-src 'self' https://www.iubenda.com https://www.google.com/; connect-src 'self' https://influweb.org/ https://*.influweb.org/ wss://influweb.org/ wss://*.influweb.org/ https://consent.iubenda.com https://hits-i.iubenda.com https://idb.iubenda.com https://www.iubenda.com https://www.google.com/recaptcha/ https://www.google.com/ http://www.w3.org/2000/svg" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 9;
    etag on;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /index.html {
        add_header Cache-Control no-cache;
    }

    location ~ /assets {
        add_header Cache-Control no-cache;
    }

    location ~ /static {
        add_header Cache-Control "max-age=31536000, immutable";
        add_header Cache-Control "max-age=0, must-revalidate";
    }

    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # proxy the PHP scripts to Apache listening on 127.0.0.1:80
    #
    #location ~ \.php$ {
    #    proxy_pass   http://127.0.0.1;
    #}

    # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
    #
    #location ~ \.php$ {
    #    root           html;
    #    fastcgi_pass   127.0.0.1:9000;
    #    fastcgi_index  index.php;
    #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
    #    include        fastcgi_params;
    #}

    # deny access to .htaccess files, if Apache's document root
    # concurs with nginx's one
    #
    #location ~ /\.ht {
    #    deny  all;
    #}
}

