name: Build docker image
run-name: ${{ inputs.image_version || github.ref_name }}

on:
  push:
    tags:
      - 'v*-staging*'
  workflow_call:
    inputs:
      image_version:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      DOCKER_USER:
        required: true
      DOCKER_PASSWORD:
        required: true
      DOCKER_ORGANIZATION:
        required: true
      DOCKER_REPO_NAME:
        required: true
  workflow_dispatch:
    inputs:
      image_version:
        default: v0.0.1
        required: true
        type: string
      environment:
        description: 'github environment to use'
        default: ''
        required: false
        type: string

jobs:
  build:
    environment: ${{ inputs.environment || 'default' }}
    runs-on: ubuntu-latest
    env:
      IMAGE_VERSION: ${{ inputs.image_version || github.ref_name }}
      DOCKER_ORGANIZATION: ${{ secrets.DOCKER_ORGANIZATION || 'influweb' }}
      DOCKER_REPO_NAME: ${{ secrets.DOCKER_REPO_NAME || 'participant-webapp' }}
    steps:
      - uses: actions/checkout@v2
      - run: git fetch --prune --unshallow --tags
      - name: Checkout case-web-app-core
        uses: actions/checkout@v2
        with:
          repository: Influweb-IT/case-web-app-core
          path: case-web-app-core
          ref: orbyta-features-frontend
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'
      - name: Install yalc globally
        run: npm install -g yalc
      - name: Build and publish case-web-app-core with yalc
        run: |
          cd case-web-app-core
          yarn install
          yarn build
          yalc publish
      - name: Add case-web-app-core via yalc
        run: yalc add @influenzanet/case-web-app-core
      - name: Move sample .env-local
        if: ${{ github.repository_owner == 'influenzanet' }}
        run: mv env-sample.config .env.local
      - name: Create .env.local for Influweb-IT
        if: ${{ github.repository_owner == 'Influweb-IT' }}
        run: cp .env .env.local
      - name: Copy sample public
        if: ${{ github.repository_owner == 'influenzanet' }}
        run: mv example-public-folder public
      - name: Override instanceId
        env:
          INSTANCE_ID: ${{ secrets.INSTANCE_ID }}
        if: ${{ env.INSTANCE_ID != '' }}
        run: |
          echo "REACT_APP_DEFAULT_INSTANCE=${{ secrets.INSTANCE_ID }}" > .env.production.local
      - name: docker login
        env:
          DOCKER_USER: ${{secrets.DOCKER_USER}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: docker login -u $DOCKER_USER -p $DOCKER_PASSWORD
      - name: Build the Docker image
        run: docker build --file Dockerfile --tag ${{ env.DOCKER_ORGANIZATION }}/${{ env.DOCKER_REPO_NAME }}:${{ env.IMAGE_VERSION }} .
      - name: Push Docker image
        run: docker push ${{ env.DOCKER_ORGANIZATION }}/${{ env.DOCKER_REPO_NAME }}:${{ env.IMAGE_VERSION }}
